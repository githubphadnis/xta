name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.1
    # Add this block to ignore docs and markdown files
    paths-ignore:
      - 'docs/**'
      - '**.md'

env:
  REGISTRY: ghcr.io
  # github.repository automatically grabs your "username/reponame"
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write   # Allows creating the GitHub Release
  packages: write   # Allows pushing the Docker image to GHCR

jobs:
  quality-gate:
    name: Quality Gate (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest -q

  release-and-publish:
    name: Release and Publish Docker Image
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # This token is securely provided by GitHub automatically
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Automatically creates tags for the exact version and 'latest'
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}