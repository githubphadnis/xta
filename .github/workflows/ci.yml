name: Build and Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.1
    # Add this block to ignore docs and markdown files
    paths-ignore:
      - 'docs/**'
      - '**.md'

env:
  REGISTRY: ghcr.io
  # github.repository automatically grabs your "username/reponame"
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write   # Allows creating the GitHub Release
  packages: write   # Allows pushing the Docker image to GHCR

jobs:
  quality-gate:
    name: Quality Gate (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check app tests

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -q

  build-and-publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # This token is securely provided by GitHub automatically
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Build immutable traceability tags + rolling latest on main.
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-from-tag:
    name: Create GitHub Release and Tag Image
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Keep semver release tags; also refresh latest for versioned releases.
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}